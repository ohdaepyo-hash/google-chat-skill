name: Auto-merge

# Wikipedia-style policy (owner's explicit choice): every PR is merged
# automatically once the required CI checks pass — no human review.
on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: '!github.event.pull_request.draft'
    steps:
      - name: Enable auto-merge (merges when required checks pass)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
